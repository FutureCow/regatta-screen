name: Export Developer Key

# Exporteert de developer_key.der als binary artifact.
# Download het artifact, base64-encodeer lokaal, en zet als org-secret.
#
# Gebruik: Actions → Export Developer Key → Run workflow
#          Download artifact → lokaal: base64 -i developer_key.der
#          Plakken als GARMIN_DEVELOPER_KEY_B64 org-secret

on:
  workflow_dispatch:

jobs:
  export-key:
    runs-on: ubuntu-latest
    steps:
      - name: Decode developer key
        run: |
          echo "$KEY_B64" | base64 --decode > developer_key.der
          echo "Key: $(wc -c < developer_key.der) bytes"
        env:
          KEY_B64: ${{ secrets.GARMIN_DEVELOPER_KEY_B64 }}

      - name: Upload key as artifact
        uses: actions/upload-artifact@v4
        with:
          name: developer-key
          path: developer_key.der
