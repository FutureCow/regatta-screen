name: Release APK + Garmin

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # ── Garmin Connect IQ SDK (monkeyc compiler) ───────────────────────────
      - name: Download Connect IQ SDK
        run: |
          SDK_FILE=$(curl -s https://developer.garmin.com/downloads/connect-iq/sdks/sdks.json | \
            python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          data.sort(key=lambda s: list(map(int, s['version'].split('.'))), reverse=True)
          print(data[0]['linux'])
          ")
          SDK_URL="https://developer.garmin.com/downloads/connect-iq/sdks/${SDK_FILE}"
          echo "Downloading Connect IQ SDK: ${SDK_FILE}"
          curl -fL "$SDK_URL" -o connectiq-sdk.zip
          unzip -q connectiq-sdk.zip -d connectiq-sdk
          chmod +x connectiq-sdk/bin/monkeyc
          echo "SDK version: $(connectiq-sdk/bin/monkeyc --version)"

      # ── Garmin device definitions (fr965) ─────────────────────────────────
      - name: Download fr965 device definition
        run: |
          DEVICES_JSON=$(curl -s https://developer.garmin.com/downloads/connect-iq/devices/devices.json)
          FR965_URL=$(echo "$DEVICES_JSON" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for d in data:
            if d.get('deviceId') == 'fr965' or d.get('id') == 'fr965':
              url = d.get('linux') or d.get('url') or ''
              if url and not url.startswith('http'):
                url = 'https://developer.garmin.com/downloads/connect-iq/devices/' + url
              print(url)
              break
          ")
          echo "fr965 device URL: $FR965_URL"
          mkdir -p "$HOME/.Garmin/ConnectIQ/Devices"
          curl -fL "$FR965_URL" -o fr965.zip
          unzip -q fr965.zip -d "$HOME/.Garmin/ConnectIQ/Devices/"
          echo "Device installed: $(ls $HOME/.Garmin/ConnectIQ/Devices/)"

      # ── Garmin Android Mobile SDK (AAR voor Android build) ─────────────────
      - name: Download Garmin Android SDK AAR
        run: |
          mkdir -p android/app/libs
          curl -fL \
            "https://raw.githubusercontent.com/garmin/connectiq-android-sdk/main/Comm%20Android/app/libs/monkeybrains-sdk-release.aar" \
            -o android/app/libs/monkeybrains-sdk-release.aar
          echo "AAR: $(ls -lh android/app/libs/*.aar)"

      # ── Garmin watch app (.prg) ────────────────────────────────────────────
      - name: Build Garmin watch app
        run: |
          echo "${{ secrets.GARMIN_DEVELOPER_KEY_B64 }}" | base64 --decode > developer_key.der
          connectiq-sdk/bin/monkeyc \
            -d fr965 \
            -f garmin/monkey.jungle \
            -o RegattaTimer.prg \
            -y developer_key.der
          echo "Garmin app: $(ls -lh RegattaTimer.prg)"

      # ── Flutter dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      # ── Android keystore ───────────────────────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_B64 }}" | base64 --decode > android/app/release.keystore

      # ── Android APK ────────────────────────────────────────────────────────
      - name: Build release APK
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: flutter build apk --release

      # ── GitHub release met beide bestanden ─────────────────────────────────
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            RegattaTimer.prg
