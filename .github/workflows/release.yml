name: Release APK + Garmin

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # ── Garmin Connect IQ SDK (monkeyc compiler) ───────────────────────────
      - name: Download Connect IQ SDK
        run: |
          SDK_FILE=$(curl -s https://developer.garmin.com/downloads/connect-iq/sdks/sdks.json | \
            python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          data.sort(key=lambda s: list(map(int, s['version'].split('.'))), reverse=True)
          print(data[0]['linux'])
          ")
          SDK_URL="https://developer.garmin.com/downloads/connect-iq/sdks/${SDK_FILE}"
          echo "Downloading Connect IQ SDK: ${SDK_FILE}"
          curl -fL "$SDK_URL" -o connectiq-sdk.zip
          unzip -q connectiq-sdk.zip -d connectiq-sdk
          chmod +x connectiq-sdk/bin/monkeyc
          echo "SDK version: $(connectiq-sdk/bin/monkeyc --version)"

      # ── Garmin Android Mobile SDK (AAR voor Android build) ─────────────────
      - name: Download Garmin Android SDK AAR
        run: |
          mkdir -p android/app/libs
          curl -fL \
            "https://raw.githubusercontent.com/garmin/connectiq-android-sdk/main/Comm%20Android/app/libs/monkeybrains-sdk-release.aar" \
            -o android/app/libs/monkeybrains-sdk-release.aar
          echo "AAR: $(ls -lh android/app/libs/*.aar)"

      # ── Garmin watch app (.iq package) ────────────────────────────────────
      # Device-definities zijn niet beschikbaar in CI (vereisen SDK Manager).
      # Als de build mislukt, gaat de APK release gewoon door.
      - name: Build Garmin watch app
        id: garmin_build
        continue-on-error: true
        run: |
          echo "${{ secrets.GARMIN_DEVELOPER_KEY_B64 }}" | base64 --decode > developer_key.der
          connectiq-sdk/bin/monkeyc \
            -e \
            -f garmin/monkey.jungle \
            -o RegattaTimer.iq \
            -y developer_key.der
          echo "Garmin app: $(ls -lh RegattaTimer.iq)"

      # ── Flutter dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      # ── Android keystore ───────────────────────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_B64 }}" | base64 --decode > android/app/release.keystore

      # ── Android APK ────────────────────────────────────────────────────────
      - name: Build release APK
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: flutter build apk --release

      # ── GitHub release ─────────────────────────────────────────────────────
      - name: Create GitHub release (APK + optioneel Garmin)
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            ${{ steps.garmin_build.outcome == 'success' && 'RegattaTimer.iq' || '' }}
